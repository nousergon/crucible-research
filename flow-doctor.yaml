flow_name: research-lambda
repo: nousergon/crucible-research
owner: "@brianmcmahon"
notify:
  - type: email
    sender: ${EMAIL_SENDER}
    recipients: ${EMAIL_RECIPIENTS}
    smtp_host: smtp.gmail.com
    smtp_port: 587
    smtp_password: ${GMAIL_APP_PASSWORD}
  - type: s3
    bucket: alpha-engine-research
    subsystem: research
  # Telegram forum-topic routing (config#1741 / T3 config#1749).
  - type: telegram
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
    message_thread_id: ${FLOW_DOCTOR_TELEGRAM_THREAD_CRITICAL}
    parse_mode: Markdown
    disable_notification: false
    notify_on: [critical]
  - type: telegram
    bot_token: ${TELEGRAM_BOT_TOKEN}
    chat_id: ${TELEGRAM_CHAT_ID}
    message_thread_id: ${FLOW_DOCTOR_TELEGRAM_THREAD_OPS_HEALTH}
    parse_mode: Markdown
    disable_notification: false
    notify_on: [error, warning]
# Shared DynamoDB dedup store (alpha-engine-config#2418): this Lambda's
# /tmp is wiped between separate invocations, so a sqlite file there can
# never accumulate the dedup state dedup_cooldown_minutes depends on —
# every alert looked "new" and cooldowns silently never applied. DynamoDB
# persists across invocations/instances, so dedup actually works.
store:
  type: dynamodb
  table_name: flow-doctor-store
  region: us-east-1
dedup_cooldown_minutes: 60
dependencies: []
rate_limits:
  max_alerts_per_day: 10
