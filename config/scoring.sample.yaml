# ─────────────────────────────────────────────────────────────────────────────
# DESCRIPTIVE / DOCUMENTATION ONLY
#
# Production reads the live config from alpha-engine-config/research/scoring.yaml
# at runtime (bundled into the Research Lambda via deploy.sh). Edits to this
# .sample file affect ONLY:
#   1. New-environment bootstrap (copies this template to scoring.yaml), and
#   2. Public-repo schema documentation for the research scoring surface.
#
# Edits here have ZERO effect on the live system. To change a runtime value
# or weight, the change MUST land in alpha-engine-config (separate private
# repo). The backtester also auto-writes weights to S3 — see s3://alpha-
# engine-research/config/scoring_weights.json (consumed at Lambda cold-start).
# ─────────────────────────────────────────────────────────────────────────────

# Scoring parameters — controls how raw signals become attractiveness scores.
# Copy to scoring.yaml and customise all values below.
# These are intentionally naive defaults — tune them to your own research.

technical:
  rsi:
    # Regime-aware overbought/oversold thresholds. Bear regime caps the
    # oversold-zone bonus (oversold in a downtrend can signal further
    # decline, not a bounce). NOTE: the bull "tolerate higher RSI"
    # relaxation was reverted 2026-05-15 (bull.overbought = neutral = 70)
    # because the regime label driving it is unvalidated — see ROADMAP
    # L1695. Sample mirrors that. Tune these to your own research.
    bull:
      overbought: 70
      oversold: 35
      max_oversold_score: 100.0
    bear:
      overbought: 70
      oversold: 40
      max_oversold_score: 75.0
    neutral:
      overbought: 70
      oversold: 30
      max_oversold_score: 100.0

  macd:
    bullish_cross_above_zero: 100.0
    bullish_cross_below_zero: 70.0
    bearish_cross_above_zero: 30.0
    bearish_cross_below_zero: 0.0
    no_cross_above_zero: 60.0
    no_cross_below_zero: 40.0

  price_vs_ma:
    upper_anchor_pct: 5
    upper_anchor_score: 80.0
    upper_max_score: 100.0
    upper_scale_pct: 15.0
    mid_score: 50.0
    positive_scale: 6.0
    lower_anchor_pct: -5
    lower_anchor_score: 30.0
    negative_scale: 4.0
    lower_floor_score: 0.0
    lower_decay: 1.5

  momentum:
    mid_score: 50.0
    raw_scale: 3.0

  composite_weights:
    rsi: 0.20
    macd: 0.20
    ma50: 0.20
    ma200: 0.20
    momentum: 0.20

  # Optional per-sector overrides of composite_weights. Keyed by sector
  # team_id: technology / healthcare / financials / industrials /
  # consumer / defensives. Each entry, if present, MUST contain all 5
  # sub-keys and sum to 1.0; malformed entries fall back to the global
  # weights above. Sectors without an entry use the global weights.
  # Default (empty) preserves sector-agnostic behaviour.
  composite_weights_per_sector: {}

  predictor_enrichment:
    confidence_gate: 0.60
    max_adjustment: 10.0

aggregator:
  macro_modifier_range: 0.30
  macro_max_shift_points: 10.0
  macro_modifier_clamp_min: 0.70
  macro_modifier_clamp_max: 1.30

  # ── Macro-shift overlay enable knob (config#1060/#1061, 2026-06-14) ─────
  # The macro_shift overlay applies a per-sector, sector-CONSTANT point
  # shift (macro_modifier → ±macro_max_shift_points) to every stock's
  # composite score. The 2026-06-14 ablation found it costs ~+0.054
  # realized rank-IC and is structurally mis-specified (cannot rank within
  # a sector; tilted toward the worst-realizing sectors; fights the
  # within-sector stock signal). When `enabled: false` the per-ticker
  # macro_shift is forced to 0.0 so final_score == combined_score.
  #
  # PUBLIC DEFAULT (this sample) = true → preserves current behavior. The
  # DISABLE is applied private-first in alpha-engine-config's gitignored
  # scoring.yaml (`enabled: false`), per the divergence policy (config#1031
  # / LEGAL_POSTURE §8). NOT managed by the backtester optimizer, so a
  # backtester run cannot silently re-enable it. Reversible — flip back to
  # true to re-enable.
  macro_overlay:
    enabled: true

  long_term_weights:
    quant: 0.50
    qual: 0.50

  # ── Pillar emit (Phase 2 of attractiveness-pillars-260520 arc) ─────────
  # Additive observability gate — when enabled, the qual ReAct agent loads
  # the pillar-rubric prompt variant and runs a SECOND structured-output
  # extraction call that produces a per-ticker QualitativePillarAssessment
  # (6-pillar decomposition: Quality / Value / Momentum / Growth /
  # Stewardship / Defensiveness, plus a structured MoatAssessment on the
  # Quality pillar and a catalyst horizon modulation field). The pillar
  # emission attaches to the run_qual_analyst result dict as
  # ``pillar_assessments`` (keyed by ticker); downstream consumers treat
  # it as additive metadata at Phase 2 — the legacy composite is unchanged.
  #
  # Phase 4 of the arc (composite scoring refactor) will consume the
  # pillar assessments into a new CompositeBreakdown; Phase 2 just ships
  # the substrate behind this flag so the soak observation period can
  # start. Default OFF (consumer-driven flip).
  pillar_emit:
    enabled: false

  consistency_check:
    bullish_terms:
      - strong buy
      - bullish
      - upside
      - outperform
    bearish_terms:
      - sell
      - downside
      - bearish
      - underperform
    bearish_score_threshold: 40
    bullish_score_threshold: 70

staleness:
  threshold_days: 5
  material_score_change_min: 3.0

macro:
  overweight_threshold: 1.10
  underweight_threshold: 0.90
