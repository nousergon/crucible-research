name: Deploy

on:
  push:
    branches: [main]
    paths:
      # Only rebuild + redeploy when code or infra that actually lands in the
      # Docker image changes. Docs, tests, CI, and example files do not.
      - 'agents/**'
      - 'data/**'
      - 'graph/**'
      - 'lambda/**'
      - 'rag/**'
      - 'scoring/**'
      - 'archive/**'
      - 'evals/**'
      - 'thinktank/**'
      - 'data_manifest.py'
      - 'config.py'
      - 'requirements*.txt'
      - 'Dockerfile*'
      - 'infrastructure/deploy.sh'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # manual trigger from Actions UI
  repository_dispatch:
    # Fired by alpha-engine-config's notify-research.yml when a push to its
    # main branch changes research/**. Rebuilds the Docker image so that
    # gitignored proprietary prompts + yaml configs (baked into the image
    # at build time via infrastructure/deploy.sh's CONFIG_REPO_DIR stage)
    # propagate to the live Lambda without a manual trigger.
    types: [config-changed]

# Concurrency: only one deploy at a time, cancel in-progress runs on new push
concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  deploy:
    name: Build + deploy to Lambda
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout research repo
        uses: actions/checkout@v7
        with:
          path: alpha-engine-research

      # deploy.sh also stages proprietary prompt templates from
      # nousergon/alpha-engine-config into the build context. That repo is
      # private so we need a fine-grained PAT with read-only Contents access.
      # The token is stored as the ALPHA_ENGINE_CONFIG_TOKEN repository secret.
      - name: Checkout alpha-engine-config
        uses: actions/checkout@v7
        with:
          repository: nousergon/alpha-engine-config
          path: alpha-engine-config
          token: ${{ secrets.ALPHA_ENGINE_CONFIG_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::711398986525:role/github-actions-lambda-deploy
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # deploy.sh's canary + alert steps run `python3 -m krepis.aws` /
      # `python3 -m krepis.alerts` directly on THIS runner (not inside the
      # Lambda's Docker image) — krepis is the shared throttle-aware invoke
      # CLI (config#1494). Until now this repo had no explicit install step
      # for it; the canary invoke happened to keep working because the
      # runner's environment resolved krepis anyway, but that was never a
      # guaranteed/verified mechanism (config#1545) — crucible-predictor and
      # crucible-evaluator hit exactly this gap as a hard `ModuleNotFoundError`
      # on 2026-07-01. Pin matches requirements.txt's `krepis>=0.7.0` floor.
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install krepis (runner-side canary + alert CLI)
        run: pip install "krepis>=0.7.0"

      - name: Deploy main Lambda (alpha-engine-research-runner)
        working-directory: alpha-engine-research
        env:
          # deploy.sh defaults CONFIG_REPO_DIR to $(dirname $(pwd))/
          # alpha-engine-config — exactly where the checkout step above
          # placed it. Explicit export here is belt-and-suspenders for
          # readers.
          CONFIG_REPO_DIR: ${{ github.workspace }}/alpha-engine-config
        run: bash infrastructure/deploy.sh main

      # Eval-judge shares the main runner's ECR image (different CMD
      # entrypoint — see deploy_eval_judge() in infrastructure/deploy.sh).
      # Without this step every deploy left the eval-judge Lambda stuck
      # on the previous image. Surfaced 2026-05-04 when the new
      # reasoning_complexity rubric prompts shipped via alpha-engine-config
      # but didn't reach the eval-judge runtime — the prior image stayed
      # live until a manual `aws lambda update-function-code` repointed
      # the function. Adding this step closes the gap so prompt updates
      # propagate cleanly to both the main runner AND the eval-judge.
      - name: Deploy eval-judge Lambda (alpha-engine-research-eval-judge)
        working-directory: alpha-engine-research
        env:
          CONFIG_REPO_DIR: ${{ github.workspace }}/alpha-engine-config
        run: bash infrastructure/deploy.sh eval_judge

      # Eval-judge Anthropic Message Batches API chain — three Lambdas
      # (-submit / -poll / -process) that share the main runner's ECR
      # image with per-Lambda CMD overrides. Same image-share rationale
      # as eval_judge above. Without this step the Saturday SF batch
      # chain (PR #136 + alpha-engine-data#189, ROADMAP §1642) would
      # invoke stale or missing function versions on every code push —
      # PR #136's initial deploy required a manual `bash deploy.sh
      # eval_judge_batch` to publish the three functions because this
      # step was missing.
      - name: Deploy eval-judge batch chain (submit/poll/process)
        working-directory: alpha-engine-research
        env:
          CONFIG_REPO_DIR: ${{ github.workspace }}/alpha-engine-config
        run: bash infrastructure/deploy.sh eval_judge_batch

      # Eval rolling-mean Lambda — the EvalRollingMean Saturday SF state.
      # Same image-share pattern, CMD override sets the entry to
      # eval_rolling_mean_handler.handler. THIS STEP WAS MISSING from the
      # workflow since the function's first manual deploy (2026-05-03):
      # deploy.sh had the eval_rolling_mean target but nothing invoked it,
      # so the Lambda silently rotted for 5+ weeks while the repo merged
      # the >500-combo chunking fix (#201), the regression auto-emit, the
      # L4578e control-bands emission, and the floor min-N gate (#279) —
      # the merged-but-not-deployed class (cf. alpha-engine-data L4609).
      # Found 2026-06-11 investigating the perpetual quality-floor ALARM.
      - name: Deploy eval rolling-mean Lambda (alpha-engine-research-eval-rolling-mean)
        working-directory: alpha-engine-research
        env:
          CONFIG_REPO_DIR: ${{ github.workspace }}/alpha-engine-config
        run: bash infrastructure/deploy.sh eval_rolling_mean

      # Cross-week rationale clustering Lambda — same image-share as
      # eval-judge, different CMD entrypoint. Created lazily on first
      # deploy; idempotent thereafter. Auto-deployed on every push to
      # match the eval-judge precedent so capture-format or extraction
      # logic changes propagate without manual intervention.
      - name: Deploy rationale-clustering Lambda (alpha-engine-research-rationale-clustering)
        working-directory: alpha-engine-research
        env:
          CONFIG_REPO_DIR: ${{ github.workspace }}/alpha-engine-config
        run: bash infrastructure/deploy.sh rationale_clustering

      # Daily cost aggregation Lambda — ROADMAP L1146. Same image-share
      # pattern as eval-judge / rationale-clustering, CMD override sets
      # the entry to aggregate_costs_handler.handler. SF-wired via the
      # Saturday alpha-engine-data step_function.json — without this
      # step the image-share Lambda would stay on whichever version was
      # current at first manual deploy. Cost-aggregation logic changes
      # in scripts/aggregate_costs.py propagate cleanly via this step.
      - name: Deploy aggregate-costs Lambda (alpha-engine-research-aggregate-costs)
        working-directory: alpha-engine-research
        env:
          CONFIG_REPO_DIR: ${{ github.workspace }}/alpha-engine-config
        run: bash infrastructure/deploy.sh aggregate_costs

      # Standalone scanner Lambda — ROADMAP L1995 Phase 1. Same
      # image-share pattern as the other content-bearing Lambdas, CMD
      # override sets the entry to scanner_handler.handler. Phase 1
      # ships the Lambda observe-only — no SF state invokes it yet
      # (Phase 2 will insert one, gated default-off). Without this
      # step the image-share Lambda would stay on whichever version
      # was current at first manual deploy. Scanner logic changes in
      # data/scanner.py + data/scanner_orchestrator.py propagate
      # cleanly via this step.
      - name: Deploy scanner Lambda (alpha-engine-research-scanner)
        working-directory: alpha-engine-research
        env:
          CONFIG_REPO_DIR: ${{ github.workspace }}/alpha-engine-config
        run: bash infrastructure/deploy.sh scanner

      # Daily think-tank Lambda — config#1579 P1. Same image-share pattern,
      # CMD override sets the entry to thinktank_handler.handler. Invoked
      # daily by the EventBridge rule alpha-research-thinktank-daily
      # (infrastructure/setup-thinktank-schedule.sh); auto-deployed on every
      # push so thinktank/ logic changes AND config-repo prompt/yaml changes
      # (via the config-changed repository_dispatch) propagate without a
      # manual step — per the standing always-wire-auto-deploy rule. The
      # ci-deploy-guard test (tests/test_deploy_targets_invoked_by_workflow.py)
      # enforces this step's existence.
      - name: Deploy thinktank Lambda (alpha-engine-research-thinktank)
        working-directory: alpha-engine-research
        env:
          CONFIG_REPO_DIR: ${{ github.workspace }}/alpha-engine-config
        run: bash infrastructure/deploy.sh thinktank

      # Signals-envelope Lambda — alpha-engine-config epic #2515 Phase B.
      # Same image-share pattern, CMD override sets the entry to
      # signals_envelope_handler.handler. Invoked ONLY by the weekly SF's
      # SignalsEnvelope state (arn:aws:states:::lambda:invoke), sequenced
      # immediately after RegimeSubstrate — never an EventBridge-scheduled
      # state. Auto-deployed on every push so scoring/signals_envelope.py
      # changes propagate without a manual step, matching every other
      # shared-image Lambda's precedent (the class of bug this guards
      # against: config#993 / the eval_rolling_mean 5-week-rot incident).
      # The ci-deploy-guard test (tests/test_deploy_targets_invoked_by_
      # workflow.py) enforces this step's existence.
      - name: Deploy signals-envelope Lambda (alpha-engine-research-signals-envelope)
        working-directory: alpha-engine-research
        env:
          CONFIG_REPO_DIR: ${{ github.workspace }}/alpha-engine-config
        run: bash infrastructure/deploy.sh signals_envelope

      - name: Report deployed version
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "Research commit: ${{ github.sha }}"
          # When the deploy was fired by a config-repo dispatch, surface
          # which config SHA it was built against so the Lambda version is
          # traceable across both repos.
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "Config commit: ${{ github.event.client_payload.config_sha }}"
          fi
          aws lambda get-function \
            --function-name alpha-engine-research-runner \
            --query "Configuration.[LastModified,CodeSha256]" \
            --output text

      - name: Append to system-wide deploy changelog
        if: always()
        uses: nousergon/nousergon-docs/.github/actions/append-changelog@main
        with:
          deploy_status: ${{ job.status == 'success' && 'success' || 'failure' }}
          deploy_workflow: deploy.yml

  # Alert (Telegram) on genuine post-merge failure of this workflow on the
  # default branch. Reusable workflow + transport in nousergon-lib. config#1128.
  notify-main-failure:
    needs: [deploy]
    if: ${{ failure() && github.ref == 'refs/heads/main' }}
    uses: nousergon/nousergon-lib/.github/workflows/notify-ci-failure.yml@main
    secrets: inherit
