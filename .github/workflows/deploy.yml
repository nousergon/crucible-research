name: Deploy

on:
  push:
    branches: [main]
    paths:
      # Only rebuild + redeploy when code or infra that actually lands in the
      # Docker image changes. Docs, tests, CI, and example files do not.
      - 'agents/**'
      - 'data/**'
      - 'graph/**'
      - 'lambda/**'
      - 'rag/**'
      - 'scoring/**'
      - 'archive/**'
      - 'evals/**'
      - 'health_status.py'
      - 'config.py'
      - 'requirements*.txt'
      - 'Dockerfile*'
      - 'infrastructure/deploy.sh'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:  # manual trigger from Actions UI
  repository_dispatch:
    # Fired by alpha-engine-config's notify-research.yml when a push to its
    # main branch changes research/**. Rebuilds the Docker image so that
    # gitignored proprietary prompts + yaml configs (baked into the image
    # at build time via infrastructure/deploy.sh's CONFIG_REPO_DIR stage)
    # propagate to the live Lambda without a manual trigger.
    types: [config-changed]

# Concurrency: only one deploy at a time, cancel in-progress runs on new push
concurrency:
  group: deploy-main
  cancel-in-progress: false

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  deploy:
    name: Build + deploy to Lambda
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout research repo
        uses: actions/checkout@v4
        with:
          path: alpha-engine-research

      # deploy.sh also stages proprietary prompt templates from
      # cipher813/alpha-engine-config into the build context. That repo is
      # private so we need a fine-grained PAT with read-only Contents access.
      # The token is stored as the ALPHA_ENGINE_CONFIG_TOKEN repository secret.
      - name: Checkout alpha-engine-config
        uses: actions/checkout@v4
        with:
          repository: cipher813/alpha-engine-config
          path: alpha-engine-config
          token: ${{ secrets.ALPHA_ENGINE_CONFIG_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::711398986525:role/github-actions-lambda-deploy
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Deploy main Lambda (alpha-engine-research-runner)
        working-directory: alpha-engine-research
        env:
          # deploy.sh defaults CONFIG_REPO_DIR to $(dirname $(pwd))/
          # alpha-engine-config — exactly where the checkout step above
          # placed it. Explicit export here is belt-and-suspenders for
          # readers.
          CONFIG_REPO_DIR: ${{ github.workspace }}/alpha-engine-config
        run: bash infrastructure/deploy.sh main

      # Eval-judge shares the main runner's ECR image (different CMD
      # entrypoint — see deploy_eval_judge() in infrastructure/deploy.sh).
      # Without this step every deploy left the eval-judge Lambda stuck
      # on the previous image. Surfaced 2026-05-04 when the new
      # reasoning_complexity rubric prompts shipped via alpha-engine-config
      # but didn't reach the eval-judge runtime — the prior image stayed
      # live until a manual `aws lambda update-function-code` repointed
      # the function. Adding this step closes the gap so prompt updates
      # propagate cleanly to both the main runner AND the eval-judge.
      - name: Deploy eval-judge Lambda (alpha-engine-research-eval-judge)
        working-directory: alpha-engine-research
        env:
          CONFIG_REPO_DIR: ${{ github.workspace }}/alpha-engine-config
        run: bash infrastructure/deploy.sh eval_judge

      # Eval-judge Anthropic Message Batches API chain — three Lambdas
      # (-submit / -poll / -process) that share the main runner's ECR
      # image with per-Lambda CMD overrides. Same image-share rationale
      # as eval_judge above. Without this step the Saturday SF batch
      # chain (PR #136 + alpha-engine-data#189, ROADMAP §1642) would
      # invoke stale or missing function versions on every code push —
      # PR #136's initial deploy required a manual `bash deploy.sh
      # eval_judge_batch` to publish the three functions because this
      # step was missing.
      - name: Deploy eval-judge batch chain (submit/poll/process)
        working-directory: alpha-engine-research
        env:
          CONFIG_REPO_DIR: ${{ github.workspace }}/alpha-engine-config
        run: bash infrastructure/deploy.sh eval_judge_batch

      # Cross-week rationale clustering Lambda — same image-share as
      # eval-judge, different CMD entrypoint. Created lazily on first
      # deploy; idempotent thereafter. Auto-deployed on every push to
      # match the eval-judge precedent so capture-format or extraction
      # logic changes propagate without manual intervention.
      - name: Deploy rationale-clustering Lambda (alpha-engine-research-rationale-clustering)
        working-directory: alpha-engine-research
        env:
          CONFIG_REPO_DIR: ${{ github.workspace }}/alpha-engine-config
        run: bash infrastructure/deploy.sh rationale_clustering

      # Daily cost aggregation Lambda — ROADMAP L1146. Same image-share
      # pattern as eval-judge / rationale-clustering, CMD override sets
      # the entry to aggregate_costs_handler.handler. SF-wired via the
      # Saturday alpha-engine-data step_function.json — without this
      # step the image-share Lambda would stay on whichever version was
      # current at first manual deploy. Cost-aggregation logic changes
      # in scripts/aggregate_costs.py propagate cleanly via this step.
      - name: Deploy aggregate-costs Lambda (alpha-engine-research-aggregate-costs)
        working-directory: alpha-engine-research
        env:
          CONFIG_REPO_DIR: ${{ github.workspace }}/alpha-engine-config
        run: bash infrastructure/deploy.sh aggregate_costs

      - name: Report deployed version
        run: |
          echo "Triggered by: ${{ github.event_name }}"
          echo "Research commit: ${{ github.sha }}"
          # When the deploy was fired by a config-repo dispatch, surface
          # which config SHA it was built against so the Lambda version is
          # traceable across both repos.
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "Config commit: ${{ github.event.client_payload.config_sha }}"
          fi
          aws lambda get-function \
            --function-name alpha-engine-research-runner \
            --query "Configuration.[LastModified,CodeSha256]" \
            --output text

      - name: Append to system-wide deploy changelog
        if: always()
        uses: cipher813/alpha-engine-docs/.github/actions/append-changelog@main
        with:
          deploy_status: ${{ job.status == 'success' && 'success' || 'failure' }}
          deploy_workflow: deploy.yml
