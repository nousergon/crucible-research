name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout research repo
        uses: actions/checkout@v7
        with:
          path: alpha-engine-research

      # Tests import config.py, which reads yaml from the private config repo.
      # Sample files in ./config/ are documentation-only and never loaded by
      # runtime — hard-fail enforces this.
      #
      # Branch-aware: if a same-named branch exists in alpha-engine-config
      # (the convention for stacked prompt-versioning PRs), check that out
      # first. Falls back to the default branch when no matching branch
      # exists. This lets the prompt-content regression locks in
      # tests/test_prompts_no_inline_json_schema.py see the PR's prompt
      # changes instead of stale main-branch prompts.
      - name: Checkout alpha-engine-config (branch-aware)
        env:
          TOKEN: ${{ secrets.ALPHA_ENGINE_CONFIG_TOKEN }}
          BRANCH: ${{ github.head_ref || github.ref_name }}
        run: |
          REPO_URL="https://x-access-token:${TOKEN}@github.com/nousergon/alpha-engine-config.git"
          if git clone --depth 1 -b "$BRANCH" "$REPO_URL" alpha-engine-config 2>/dev/null; then
            echo "Checked out alpha-engine-config@$BRANCH (matching PR branch)"
          else
            git clone --depth 1 "$REPO_URL" alpha-engine-config
            echo "No matching branch '$BRANCH' in alpha-engine-config — using default branch"
          fi

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: alpha-engine-research
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        working-directory: alpha-engine-research
        run: pytest tests/ -v
        env:
          PYTHONPATH: .

      - name: Security audit
        run: |
          pip install pip-audit
          pip-audit --ignore-vuln PYSEC-2026-2562 || true

  # Alert (Telegram) ONLY on genuine post-merge breakage of the default
  # branch. PR-branch reds (mid-fix commits, cross-repo lib-tag merge-order
  # races) stay silent. Reusable workflow + transport in nousergon-lib.
  # See alpha-engine-config#1128.
  notify-main-failure:
    needs: [test]
    if: ${{ failure() && github.ref == 'refs/heads/main' }}
    uses: nousergon/nousergon-lib/.github/workflows/notify-ci-failure.yml@main
    secrets: inherit
