# RAG retrieval eval — hand-curated test set
#
# Each entry pairs a natural-language query with one or more chunk_id(s)
# that a correctly-tuned retriever should surface in the top_k.
#
# Workflow:
# 1. Type queries here with `expected_chunk_ids: ["TODO"]` placeholders.
# 2. Run `python scripts/curate_rag_query.py` (interactive helper —
#    walks each TODO, shows top-10 vector + keyword candidates, you
#    pick the chunk that genuinely answers the query, writes back).
# 3. Run `python scripts/run_rag_retrieval_eval.py` for the report.
#
# Categories (match evals.rag_retrieval.CATEGORIES):
# - ticker_named_entity     queries leaning on company / brand / product names
# - filing_type             queries that key on 10-K / 10-Q / 8-K shape
# - date_range              queries with a temporal anchor
# - quantitative_line_item  queries asking about $ / % / ratio line items
# - abstract_thesis         queries about competitive moat / strategy
# - conceptual_narrative    queries about strategic events / narratives

